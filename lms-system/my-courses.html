<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | SmartLMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-mortarboard-fill me-2"></i>SmartLMS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="create-course.html">Create Course</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="my-courses.html">My Courses</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">
                <i class="bi bi-book-half text-primary"></i> My Courses
            </h1>
            <div>
                <span id="totalCoursesBadge" class="badge bg-primary fs-6 px-3 py-2">0 Courses</span>
                <button id="clearAllCourses" class="btn btn-outline-danger ms-2">
                    <i class="bi bi-trash"></i> Clear All
                </button>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="searchCourse" class="form-control" placeholder="🔍 Search courses by title...">
                    </div>
                    <div class="col-md-4">
                        <select id="filterCategory" class="form-select">
                            <option value="">All Categories</option>
                            <option value="Technology">Technology</option>
                            <option value="Business">Business</option>
                            <option value="Design">Design</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Language">Language</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button id="resetFilters" class="btn btn-outline-secondary w-100">Reset</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Courses Grid -->
        <div id="coursesGrid" class="row g-4"></div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-journal-bookmark-fill fs-1 text-muted"></i>
            <h3 class="mt-3">No Courses Yet</h3>
            <p class="text-muted">Create your first course and start learning!</p>
            <a href="create-course.html" class="btn btn-primary mt-2">
                <i class="bi bi-plus-circle"></i> Create Course
            </a>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div class="modal fade" id="quizModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-question-circle"></i> Course Quiz
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="quizModalBody">
                    <div id="quizQuestions"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="submitQuiz()">Submit Quiz</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
