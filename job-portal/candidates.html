<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applied Candidates | JobHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-briefcase-fill me-2"></i>JobHub
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light me-2">Recruiter</a>
                <a href="jobs.html" class="btn btn-outline-light">Jobs</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex flex-wrap justify-content-between align-items-center">
                    <div>
                        <h1 class="fw-bold">
                            <i class="bi bi-people-fill text-primary"></i> 
                            Applied Candidates
                        </h1>
                        <p class="text-muted">Review and manage all job applications</p>
                    </div>
                    <div class="mt-2 mt-sm-0">
                        <span class="badge bg-success fs-6 px-3 py-2">
                            <i class="bi bi-person-check"></i> 
                            <span id="totalApplicantsCount">0</span> Total Applications
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="card-glass p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" id="searchApplicantInput" class="form-control" placeholder="🔍 Search by name, email, or job title...">
                </div>
                <div class="col-md-4">
                    <select id="filterJob" class="form-select">
                        <option value="">All Jobs</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button id="resetApplicantFilters" class="btn btn-outline-secondary w-100">Reset</button>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4" id="statsCards"></div>

        <!-- Applicants Grid -->
        <div id="applicantsGrid" class="row g-4"></div>

        <!-- Empty State -->
        <div id="emptyApplicantsState" class="text-center py-5 d-none">
            <i class="bi bi-inbox fs-1 text-muted"></i>
            <h4 class="mt-3">No applications yet</h4>
            <p class="text-muted">When candidates apply for jobs, they will appear here.</p>
            <a href="jobs.html" class="btn-gradient mt-2">View Available Jobs</a>
        </div>

        <!-- Export Button -->
        <div class="text-center mt-4">
            <button id="exportDataBtn" class="btn btn-outline-primary">
                <i class="bi bi-download"></i> Export Applications (CSV)
            </button>
        </div>
    </div>

    <!-- View Details Modal -->
    <div class="modal fade" id="applicantDetailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-person-badge"></i> Applicant Details
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="applicantDetailContent">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
