<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Jobs | JobHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-briefcase-fill me-2"></i>JobHub
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light me-2">Recruiter</a>
                <a href="candidates.html" class="btn btn-outline-light">Candidates</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex flex-wrap justify-content-between align-items-center">
                    <div>
                        <h1 class="fw-bold">
                            <i class="bi bi-search-heart text-primary"></i> 
                            Available Positions
                        </h1>
                        <p class="text-muted">Find your dream job from the listings below</p>
                    </div>
                    <div class="mt-2 mt-sm-0">
                        <span class="badge bg-primary fs-6 px-3 py-2">
                            <i class="bi bi-briefcase"></i> 
                            <span id="totalJobsCount">0</span> Open Positions
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search and Filter Section -->
        <div class="card-glass p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search by title, company, or location...">
                </div>
                <div class="col-md-4">
                    <select id="filterLocation" class="form-select">
                        <option value="">All Locations</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button id="resetFilters" class="btn btn-outline-secondary w-100">Reset Filters</button>
                </div>
            </div>
        </div>

        <!-- Jobs Grid -->
        <div id="jobsGrid" class="row g-4"></div>

        <!-- Empty State -->
        <div id="emptyJobsState" class="text-center py-5 d-none">
            <i class="bi bi-inbox fs-1 text-muted"></i>
            <h4 class="mt-3">No jobs found</h4>
            <p class="text-muted">Try adjusting your search or check back later for new opportunities.</p>
            <a href="index.html" class="btn-gradient mt-2">Post a Job</a>
        </div>
    </div>

    <!-- Apply Modal -->
    <div class="modal fade" id="applyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-send-check-fill text-primary"></i> Apply for Position
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="applyForm">
                        <input type="hidden" id="jobId">
                        <div id="jobTitlePreview" class="alert alert-light mb-3"></div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name *</label>
                            <input type="text" id="applicantName" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address *</label>
                            <input type="email" id="applicantEmail" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone (Optional)</label>
                            <input type="tel" id="applicantPhone" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Resume/CV *</label>
                            <input type="file" id="resumeFile" class="form-control" accept=".pdf,.doc,.docx" required>
                            <small class="text-muted">Supported: PDF, DOC, DOCX (Max 5MB)</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cover Letter (Optional)</label>
                            <textarea id="coverLetter" rows="3" class="form-control" placeholder="Tell us why you're a great fit..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn-gradient w-100 py-2">
                            <i class="bi bi-cloud-upload"></i> Submit Application
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
